name: Feature request
description: Suggest something new or different.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation that prompted this idea — not the solution yet.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: Your proposed change or feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches you thought about.
    validations:
      required: false
